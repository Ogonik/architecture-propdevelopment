# namespace
apiVersion: v1
kind: Namespace
metadata:
  name: 4nginx
  labels:
    name: 4nginx
---

#frontend
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: default
  labels:
    app: frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend-app
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: frontend-app
    spec:
      containers:
      - name: frontend-app
        image: bitnami/nginx:1.29.0-debian-12-r2
        imagePullPolicy: Never
        ports:
        - containerPort: 8081
        resources:
          limits:
            cpu: "300m"
            memory: "64Mi"
      restartPolicy: Always
---


#frontend-service
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: default
spec:
  selector:
    app: frontend-app
  ports:
  - port: 8081
    targetPort: 8081
  type: ClusterIP
---


#frontend-admin
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend-admin
  namespace: default
  labels:
    app: frontend-admin
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend-admin-app
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: frontend-admin-app
