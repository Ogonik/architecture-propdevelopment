      containers:
      - name: frontend-admin-app
        image: bitnami/nginx:1.29.0-debian-12-r2
        imagePullPolicy: Never
        ports:
        - containerPort: 8881
        resources:
          limits:
            cpu: "300m"
            memory: "64Mi"
      restartPolicy: Always
---

#frontend-admin-service
apiVersion: v1
kind: Service
metadata:
  name: frontend-admin
  namespace: default
spec:
  selector:
    app: frontend-admin-app
  ports:
  - port: 8881
    targetPort: 8881
  type: ClusterIP
---


